name: Frontend CD
on:
  push:
    branches:
      - main
      - 'feature/**'
  
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      ${{
        github.event_name == 'workflow_dispatch'
        && inputs.environment
        || 'dev'
      }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
        run: npm run build

      - name: Determine deployment target
        id: deployment
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger
            BRANCH_NAME="main"
            ENVIRONMENT="${{ inputs.environment }}"
            if [ "$ENVIRONMENT" == "prod" ]; then
              S3_BUCKET="${{ secrets.YKV_AWS_S3_BUCKET_PROD }}"
            else
              S3_BUCKET="${{ secrets.YKV_AWS_S3_BUCKET_DEV }}"
            fi
          else
            # Push or PR trigger
            BRANCH_NAME="${{ github.ref_name }}"
            if [[ "$BRANCH_NAME" == "main" ]]; then
              S3_BUCKET="${{ secrets.YKV_AWS_S3_BUCKET_DEV }}"
            elif [[ "$BRANCH_NAME" == feature/* ]]; then
              BRANCH_SLUG=$(echo "$BRANCH_NAME" | sed 's/feature\///' | tr '/' '-' | tr '_' '-')
              S3_BUCKET="buildmates-${BRANCH_SLUG}"
            else
              echo "Unknown branch: $BRANCH_NAME"
              exit 1
            fi
          fi
          
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:
            ${{ secrets.YKV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:
            ${{ secrets.YKV_AWS_SECRET_ACCESS_KEY }}
          aws-region:
            ${{ secrets.YKV_AWS_REGION }}

      - name: Create S3 bucket for feature branch (if needed)
        run: |
          BUCKET="${{ steps.deployment.outputs.s3_bucket }}"
          BRANCH="${{ steps.deployment.outputs.branch }}"
          
          # Check if this is a feature branch
          if [[ "$BRANCH" == feature/* ]]; then
            echo "Creating S3 bucket for feature branch: $BUCKET"
            
            # Check if bucket exists
            if aws s3 ls "s3://${BUCKET}" 2>&1 | grep -q 'NoSuchBucket'; then
              echo "Bucket does not exist. Creating: $BUCKET"
              aws s3 mb "s3://${BUCKET}" --region ${{ secrets.YKV_AWS_REGION }}
              
              # Enable versioning
              aws s3api put-bucket-versioning \
                --bucket "${BUCKET}" \
                --versioning-configuration Status=Enabled
              
              # Block public access for security
              aws s3api put-public-access-block \
                --bucket "${BUCKET}" \
                --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
              
              echo "Bucket created successfully: $BUCKET"
            else
              echo "Bucket already exists: $BUCKET"
            fi
          else
            echo "Using existing bucket for branch $BRANCH: $BUCKET"
          fi
        shell: bash

      - name: Deploy To S3
        run: |
          echo "Deploying S3 Bucket: ${{ steps.deployment.outputs.s3_bucket }}"
          aws s3 sync dist s3://${{ steps.deployment.outputs.s3_bucket }} --delete

      - name: Deployment Complete
        if: always()
        run: |
          BUCKET="${{ steps.deployment.outputs.s3_bucket }}"
          REGION="${{ secrets.YKV_AWS_REGION }}"
          URL="http://${BUCKET}.s3-website.${REGION}.amazonaws.com"
          
          echo "========================================"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "========================================"
          echo "S3 Bucket: ${BUCKET}"
          echo "Region: ${REGION}"
          echo "Website URL: ${URL}"
          echo "========================================"