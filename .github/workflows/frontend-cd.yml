name: Frontend CD

on:
  workflow_run:
    workflows:
      - Frontend CI
    types:
      - completed

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_YOGI }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_YOGI }}
          aws-region: ${{ secrets.AWS_REGION_YOGI }}

      - name: Deploy To S3
        run: aws s3 sync dist s3://${{ secrets.S3_BUCKET_NAME_YOGI }} --delete