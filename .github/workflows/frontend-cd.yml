name: Frontend CD

on:
  workflow_run:
    workflows:
      - Frontend CI
    types:
      - completed
    branches:
      - main

jobs:
  build-and-deploy:
    # Only run if the CI pipeline actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_YOGI }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_YOGI }}
          aws-region: ${{ secrets.AWS_REGION_YOGI }}

      # The 'dist' folder is now populated by the downloaded artifact
      - name: Deploy To S3
        run: aws s3 sync dist s3://${{ secrets.S3_BUCKET_NAME_YOGI }} --delete